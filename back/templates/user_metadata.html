<div id="user-metadata">
    <h3>user: {{ username }} </h3>
    <h3>uuid: {{ uuid }}</h3>
    <h3>created at: {{ created_at }}</h3>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <div>
            <label>
                Upload file:
                <input type="file" name="file" multiple>
            </label>
        </div>

        <div>
            <input type="submit" value="Upload files">
        </div>
    </form>

    <table>
        <thead>
            <tr>
                <th>song_id</th>
                <th>added</th>
                <th>length</th>
                <th>class</th>
                <th>delete</th>
            </tr>
        </thead>
    </table>
</div>
